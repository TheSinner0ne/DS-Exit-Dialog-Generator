<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F19"/>
      <stop offset="50%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#050811"/>
    </linearGradient>

    <!-- Dialog Card Glass Gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0.98"/>
    </linearGradient>

    <!-- Glowing Border Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FF66"/>
      <stop offset="50%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#FF0055"/>
    </linearGradient>

    <!-- Magenta Button Gradient -->
    <linearGradient id="magentaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF0055"/>
      <stop offset="100%" stop-color="#CC0044"/>
    </linearGradient>

    <!-- Cyan Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Soft Card Drop Shadow -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Base Icon Squircle Background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>
  
  <!-- Subtle Outer Border Accent -->
  <rect x="2" y="2" width="508" height="508" rx="110" stroke="url(#borderGrad)" stroke-opacity="0.3" stroke-width="3" fill="none"/>

  <!-- Radial Glow Behind the Dialog Card -->
  <circle cx="256" cy="256" r="160" fill="#38BDF8" opacity="0.12" filter="url(#neonGlow)"/>
  <circle cx="210" cy="200" r="100" fill="#00FF66" opacity="0.1" filter="url(#neonGlow)"/>

  <!-- Background Tech Grid Lines -->
  <g opacity="0.08" stroke="#38BDF8" stroke-width="1.5">
    <line x1="96" y1="0" x2="96" y2="512"/>
    <line x1="176" y1="0" x2="176" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="336" y1="0" x2="336" y2="512"/>
    <line x1="416" y1="0" x2="416" y2="512"/>
    <line x1="0" y1="96" x2="512" y2="96"/>
    <line x1="0" y1="176" x2="512" y2="176"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="336" x2="512" y2="336"/>
    <line x1="0" y1="416" x2="512" y2="416"/>
  </g>

  <!-- MAIN DIALOG CARD (The App Hero Element) -->
  <g filter="url(#cardShadow)">
    <!-- Card Frame Base -->
    <rect x="80" y="112" width="352" height="288" rx="28" fill="url(#cardGrad)"/>
    <!-- Glowing Gradient Border -->
    <rect x="80" y="112" width="352" height="288" rx="28" stroke="url(#borderGrad)" stroke-width="3.5" fill="none"/>
  </g>

  <!-- Dialog Window Header Bar -->
  <line x1="80" y1="168" x2="432" y2="168" stroke="#334155" stroke-width="2"/>

  <!-- Window Header Controls (Dots) -->
  <circle cx="116" cy="140" r="5" fill="#FF5F56"/>
  <circle cx="134" cy="140" r="5" fill="#FFBD2E"/>
  <circle cx="152" cy="140" r="5" fill="#27C93F"/>

  <!-- Script / Code Tag Symbol in Header -->
  <path d="M380 132 L372 140 L380 148 M396 132 L404 140 L396 148" stroke="#38BDF8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- HERO CENTER GRAPHIC: Glowing Exit Door + Arrow Glyph -->
  <g filter="url(#neonGlow)">
    <!-- Door Frame -->
    <path d="M 216 210 H 184 V 294 H 216" stroke="#00FF66" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Exit Arrow Shaft & Head -->
    <path d="M 204 252 H 316" stroke="#00FF66" stroke-width="7" stroke-linecap="round"/>
    <path d="M 288 224 L 320 252 L 288 280" stroke="#00FF66" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- DIALOG ACTION BUTTONS (Bottom Right) -->
  <!-- Abort Button (Outline Sharp) -->
  <rect x="220" y="332" width="88" height="40" rx="10" fill="#0F172A" stroke="#475569" stroke-width="2"/>
  <text x="264" y="357" font-family="system-ui, sans-serif" font-weight="700" font-size="12" fill="#94A3B8" text-anchor="middle" letter-spacing="1">ABORT</text>

  <!-- Confirm Button (Glowing Hot Magenta) -->
  <g filter="url(#neonGlow)">
    <rect x="320" y="332" width="96" height="40" rx="10" fill="url(#magentaGrad)"/>
    <text x="368" y="357" font-family="system-ui, sans-serif" font-weight="800" font-size="12" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">EXIT</text>
  </g>

</svg>
